<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador PRO de Presupuestos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">
  <section class="card">
    <h1>Generador PRO de Presupuestos</h1>
    <p class="intro">Presupuestos profesionales para webs, Google Business, SEO y mantenimiento.</p>

    <div class="grid">
      <input id="cliente" placeholder="Cliente">
      <input id="negocio" placeholder="Negocio">
      <input id="ciudad" placeholder="Ciudad">
      <input id="telefono" placeholder="Teléfono">
    </div>

    <div class="packs">

  <div class="pack">
    <button onclick="aplicarPack('basico')">Pack Básico</button>
    <div class="extras">
      <label><input type="checkbox" value="3"> SEO local inicial</label>
      <label><input type="checkbox" value="4"> Hosting y dominio</label>
      <label><input type="checkbox" value="5"> WhatsApp y llamadas</label>
    </div>
  </div>

  <div class="pack">
    <button onclick="aplicarPack('local')">Pack Local</button>
    <div class="extras">
      <label><input type="checkbox" value="3"> SEO local inicial</label>
      <label><input type="checkbox" value="6"> Textos SEO</label>
      <label><input type="checkbox" value="7"> Mantenimiento mensual</label>
    </div>
  </div>

  <div class="pack">
    <button onclick="aplicarPack('completo')">Pack Completo</button>
    <div class="extras">
      <label><input type="checkbox" value="3"> SEO local inicial</label>
      <label><input type="checkbox" value="4"> Hosting y dominio</label>
      <label><input type="checkbox" value="6"> Textos SEO</label>
      <label><input type="checkbox" value="7"> Mantenimiento mensual</label>
    </div>
  </div>

</div>

    <h2>Servicios</h2>
    <div id="servicios" class="servicios"></div>

    <h2>Configuración</h2>
    <div class="grid">
      <input id="descuento" type="number" placeholder="Descuento €" value="0">
      <select id="iva">
        <option value="0">Sin IVA</option>
        <option value="21">+21% IVA</option>
      </select>
    </div>

    <div class="total-box">
      <div>
        <p>Precio normal</p>
        <strong id="subtotal">0 €</strong>
      </div>
      <div>
        <p>Precio oferta</p>
        <strong id="total">0 €</strong>
      </div>
    </div>

    <div class="mensual-box">
      <p>Mantenimiento mensual recomendado</p>
      <strong id="mensual">0 €/mes</strong>
    </div>

    <textarea id="observaciones" placeholder="Observaciones"></textarea>

    <div class="actions">
      <button onclick="guardarCliente()">Guardar cliente</button>
      <button onclick="generarPDF()">Generar PDF</<button onclick="generarYEnviar()">Generar + Enviar por WhatsApp</button>>
      <button onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
    </div>

    <h2>Clientes guardados</h2>
    <div id="clientesGuardados" class="clientes"></div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
